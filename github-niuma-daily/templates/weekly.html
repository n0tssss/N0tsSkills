<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>牛马周报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg-primary: #0a0a0f;
    --bg-card: #12121a;
    --border: rgba(255,255,255,0.06);
    --text-primary: #f0f0f5;
    --text-secondary: #8a8a9a;
    --text-muted: #5a5a6a;
    --accent-purple: #a855f7;
    --accent-green: #00d68f;
    --accent-red: #ff4757;
    --gradient-purple: linear-gradient(135deg, #a855f7, #6366f1);
  }
  
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    min-height: 100vh;
    padding: 0;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  
  .container {
    max-width: 400px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }
  
  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  
  .date-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-purple);
    box-shadow: 0 0 8px var(--accent-purple);
  }
  
  .date {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  
  .title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
  }
  
  .title span {
    background: var(--gradient-purple);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .status-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  
  .status-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--gradient-purple);
  }
  
  .status-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(168,85,247,0.15);
    color: #a855f7;
  }
  
  .score-block { text-align: right; }
  
  .score {
    font-size: 48px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
    background: var(--gradient-purple);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .score-unit {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 4px;
  }
  
  .comment {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-secondary);
    padding-left: 12px;
    border-left: 2px solid #a855f7;
  }
  
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .stat-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  
  .stat-icon-commits { background: rgba(168,85,247,0.12); }
  .stat-icon-lines { background: rgba(0,214,143,0.12); }
  .stat-icon-pr { background: rgba(59,130,246,0.12); }
  .stat-icon-repos { background: rgba(255,107,53,0.12); }
  
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.2;
  }
  
  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  
  .code-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  
  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  
  .code-title {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  
  .code-values {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }
  
  .code-add { color: var(--accent-green); }
  .code-del { color: var(--accent-red); }
  
  .code-bar {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
    gap: 2px;
  }
  
  .code-bar-add {
    background: var(--accent-green);
    border-radius: 3px;
  }
  
  .code-bar-del {
    background: var(--accent-red);
    border-radius: 3px;
  }
  
  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  
  .repo-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .repo-rank {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
    background: rgba(168,85,247,0.15);
    color: #a855f7;
  }
  
  .repo-rank.rank-1 {
    background: var(--gradient-purple);
    color: #fff;
  }
  
  .repo-info {
    flex: 1;
    min-width: 0;
  }
  
  .repo-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
  }
  
  .repo-bar {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  
  .repo-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--gradient-purple);
  }
  
  .repo-diff {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 6px;
    color: var(--text-muted);
  }
  
  .repo-count {
    font-size: 16px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: #a855f7;
    flex-shrink: 0;
  }
  
  .repo-count span {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
  }
  
  .footer {
    text-align: center;
    padding: 24px 0 0;
    color: var(--text-muted);
    font-size: 12px;
  }
  
  .footer-icon {
    font-size: 20px;
    margin-bottom: 8px;
  }
  
  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="date-row">
    <div class="date-dot"></div>
    <div class="date">{{DATE}} {{WEEKDAY}}</div>
  </div>
  
  <div class="title"><span>牛马周报</span></div>
  
  <div class="status-card">
    <div class="status-top">
      <div class="status-badge">{{STATUS_BADGE}}</div>
      <div class="score-block">
        <div class="score">{{SCORE}}</div>
        <div class="score-unit">WEEKLY SCORE</div>
      </div>
    </div>
    <div class="comment">{{COMMENT}}</div>
  </div>
  
  <div class="section-label">数据概览</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon stat-icon-commits">📝</div>
      <div class="stat-info">
        <div class="stat-value">{{COMMITS}}</div>
        <div class="stat-label">总提交</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-lines">💻</div>
      <div class="stat-info">
        <div class="stat-value">{{CODE_LINES}}</div>
        <div class="stat-label">代码行</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-pr">🔀</div>
      <div class="stat-info">
        <div class="stat-value">{{PR_COUNT}}</div>
        <div class="stat-label">PR</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-repos">📁</div>
      <div class="stat-info">
        <div class="stat-value">{{REPOS_COUNT}}</div>
        <div class="stat-label">仓库</div>
      </div>
    </div>
  </div>
  
  <div class="code-card">
    <div class="code-header">
      <div class="code-title">代码变更</div>
      <div class="code-values">
        <span class="code-add">{{ADDITIONS}}</span>
        <span style="color:var(--text-muted);margin:0 4px">/</span>
        <span class="code-del">{{DELETIONS}}</span>
      </div>
    </div>
    <div class="code-bar">
      <div class="code-bar-add" style="width: {{ADD_PCT}}%"></div>
      <div class="code-bar-del" style="width: {{DEL_PCT}}%"></div>
    </div>
  </div>
  
  <div class="section-label">仓库 TOP</div>
  {{REPOS_HTML}}
  
  <div class="footer">
    <div class="footer-icon">💪</div>
    下周继续冲！
  </div>
</div>
</body>
</html>
